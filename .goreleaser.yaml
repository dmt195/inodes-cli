version: 2

project_name: inodes

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: inodes
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: ['tar.gz']
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ['zip']

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: inodes
    description: "CLI for the Image Nodes image processing API"
    homepage: "https://imagenodes.com"
    binaries:
      - inodes
    repository:
      owner: dmt195
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
