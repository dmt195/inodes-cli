name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download source tarball and get SHA256
        id: sha
        run: |
          curl -sL "https://github.com/dmt195/inodes-cli/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" -o source.tar.gz
          echo "sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/dmt195/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/inodes.rb << 'FORMULA'
          class Inodes < Formula
            desc "CLI for the Image Nodes image processing API"
            homepage "https://imagenodes.com"
            url "URL_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"
            license "MIT"

            depends_on "go" => :build

            def install
              ldflags = "-s -w -X main.version=#{version}"
              system "go", "build", *std_go_args(ldflags: ldflags)
              system "go", "build", "-ldflags", ldflags, "-o", bin/"inodes-mcp-server", "./cmd/mcp-server"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/inodes --version")
              assert_match "imagenodes", shell_output("#{bin}/inodes-mcp-server --help 2>&1", 0)
            end
          end
          FORMULA

          # Replace placeholders with actual values
          sed -i "s|URL_PLACEHOLDER|https://github.com/dmt195/inodes-cli/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz|" tap/Formula/inodes.rb
          sed -i "s|SHA_PLACEHOLDER|${{ steps.sha.outputs.sha256 }}|" tap/Formula/inodes.rb

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' tap/Formula/inodes.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/inodes.rb
          git commit -m "Update inodes to ${{ steps.version.outputs.version }}"
          git push
